name: Deploy Lapor Mang

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/lapor-backend:latest ./backend
          docker build \
            --build-arg VITE_API_BASE_URL=http://${{ secrets.VM_IP }}:5000 \
            --build-arg VITE_SOCKET_URL=http://${{ secrets.VM_IP }}:5000 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/lapor-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lapor-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lapor-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH to VM and Update
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd Lapor-Mang
            git pull origin master
            docker compose pull
            docker compose up -d
            docker image prune -f
