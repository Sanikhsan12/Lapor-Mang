version: "3.8"

services:
  db:
    image: postgres:15
    container_name: health_report_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: health_report
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health_report_backend
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/health_report?schema=public
      - JWT_SECRET=supersafejwtsecretforuts
      - PORT=5000
      - CORS_ORIGIN=http://localhost:8080
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db
    restart: unless-stopped
    command: >
      sh -c "npx prisma db push && node src/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:5000/api
        - VITE_SOCKET_URL=http://localhost:5000
    container_name: health_report_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
