version: "3.8"

services:
  backend:
    image: muhammadikhsan/lapor-backend:latest
    container_name: health_report_backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - AZURE_STORAGE_CONTAINER_NAME=${AZURE_STORAGE_CONTAINER_NAME}
    ports:
      - "${PORT}:${PORT}"
    restart: unless-stopped
    command: >
      sh -c "npx prisma generate && npx prisma db push && node src/index.js"

  frontend:
    image: muhammadikhsan/lapor-frontend:latest
    container_name: health_report_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
